# True color 端末を使用する
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*:RGB"

# ウィンドウとペインの番号を 1 から開始
set -g base-index 1
setw -g pane-base-index 1
# ウィンドウを閉じた時に番号を詰める
set-option -g renumber-windows on

# マウス有効化
set-option -g mouse on

# ステータスバーの長さを設定
set -g status-left-length 90

# ステータスバーの内容を設定
set -g status-fg "colour255"
set -g status-bg "colour238"
set -g status-left '#H:[#P]'                # 左: マシン名・ペイン番号
set -g status-right '#(pgrep -x SecurityAgent > /dev/null && echo "⚠MODAL " || echo "")[%Y-%m-%d(%a) %H:%M]'  # 右: セキュリティダイアログ検出・日付
set -g status-interval 3  # モーダル検出のため3秒間隔で更新
setw -g window-status-format " #I: #W "     # 中央: ウィンドウのインデックス・名前
setw -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W"  # 現在のウィンドウの内容

# バッファサイズを50kに
set-option -g history-limit 50000

# --- Claude Code 向け設定 ---
# ESC/Option の遅延を消す
set -sg escape-time 10
# Shift+Enter などの modified key を透過（multi-line 入力用）
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
# フォーカスイベントを有効化
set -g focus-events on
# 他ペインで Claude が \a を鳴らしたら気付けるように
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# log output
bind-key H pipe-pane 'cat >> $HOME/.tmux/tmux-#W.log' \; display-message 'Started logging to $HOME/.tmux/tmux-#W.log'
bind-key h pipe-pane \; display-message 'Ended logging to $HOME/.tmux/tmux-#W.log'
